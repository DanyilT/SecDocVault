<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SecDocVault Email Verification</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0b1020;
        color: #f3f5ff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(680px, 92vw);
        background: #151d38;
        border: 1px solid #2a3768;
        border-radius: 14px;
        padding: 24px;
        box-sizing: border-box;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.2rem;
      }
      p {
        margin: 0 0 12px;
        line-height: 1.5;
      }
      code {
        display: block;
        padding: 10px;
        border-radius: 8px;
        background: #0f1429;
        overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>SecDocVault email link ready</h1>
      <p>
        This Firebase Hosting page is the continue URL for authentication email links.
      </p>
      <p>
        If you opened this on mobile, tap the button below to return to SecDocVault and finish verification.
      </p>
      <p>
        <a id="openApp" href="#" style="color: #93c5fd; font-weight: 600;">Open SecDocVault</a>
      </p>
      <code id="link">Loading link details...</code>
    </main>
    <script>
      const linkElement = document.getElementById('link');
      const openAppElement = document.getElementById('openApp');
      const verificationUrl = window.location.href;
      const appLink = `secdocvault://auth/email-link?link=${encodeURIComponent(verificationUrl)}`;

      if (linkElement) {
        linkElement.textContent = verificationUrl;
      }

      if (openAppElement) {
        openAppElement.href = appLink;
      }

      // Best-effort auto handoff; user can still tap the link manually if blocked.
      if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
        window.location.href = appLink;
      }
    </script>
  </body>
</html>
